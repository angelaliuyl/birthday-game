<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Location</h1>

    <img
        src="img/tower.jpg"
        alt="location clue"
        class="clue-image"
    >

    <p class="clue">
        SPOKES
    </p>

    <input
        id="answer"
        type="text"
        autocomplete="off"
        placeholder="NN"
        style="--content-width: 10ch;"
        maxlength="2"
    >

    <button id="continueButton" disabled>
        Continue
    </button>

</div>

<script src="js/routes.js"></script>
<script src="js/common.js"></script>

<script>
setupPuzzle("tower", "12");
</script>

</body>
</html>
