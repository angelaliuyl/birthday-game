<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Welcome</h1>

    <p>
        Solve your starting clue to identify your country.
        Enter the country below to begin your route.
    </p>

    <input
        id="country"
        type="text"
        placeholder="Country"
        autocomplete="off"
    >

    <p id="message"></p>

    <button id="continueButton" disabled>
        Continue
    </button>

</div>

<script src="js/routes.js"></script>
<script src="js/common.js"></script>

</body>
</html>
